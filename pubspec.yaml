name: ac_ai
description: AC AI - Your Intelligent Voice Companion (Complete Automation)

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.5+1
  
  # UI Animation
  flutter_animate: ^4.5.2
  cupertino_icons: ^1.0.9
  
  # Speech-to-Text
  speech_to_text: ^7.4.0
  
  # Text-to-Speech
  flutter_tts: ^4.2.5
  
  # HTTP & API
  http: ^1.6.0
  
  # Permissions
  permission_handler: ^12.0.3
  
  # Storage
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  
  # Background Service
  flutter_background_service: ^5.1.0
  awesome_notifications: ^0.11.0
  
  # Location
  geolocator: ^14.0.2
  
  # Contacts (Updated package)
  fast_contacts: ^5.0.1
  
  # URL Launcher
  url_launcher: ^6.3.2
  
  # Image Picker
  image_picker: ^1.2.2
  
  # Torch/Flashlight
  torch_light: ^2.0.0
  
  # Connectivity
  connectivity_plus: ^7.1.1
  
  # File Management
  file_picker: ^11.0.2
  open_file: ^3.5.11
  
  # Web Scraping & Search
  web_scraper: ^0.1.4
  html: ^0.15.6
  
  # PDF Generation
  pdf: ^3.12.0
  printing: ^5.14.3
  
  # Screenshot
  screenshot: ^3.0.0
  
  # Screen Brightness
  screen_brightness: ^2.1.9
  
  # Volume Control
  flutter_volume_controller: ^2.0.1
  
  # Media Player Control
  audio_session: ^0.2.3
  
  # Camera
  camera: ^0.12.0+1
  
  # File Download
  flutter_downloader: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
