name: ac_ai
description: AC AI - Your Intelligent Voice Companion (Complete Automation)

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # UI Animation
  flutter_animate: ^4.3.0
  cupertino_icons: ^1.0.6
  
  # Speech-to-Text
  speech_to_text: ^6.6.0
  
  # Text-to-Speech
  flutter_tts: ^3.8.5
  
  # HTTP & API
  http: ^0.13.6
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Background Service
  flutter_background_service: ^5.0.5
  awesome_notifications: ^0.9.3+1
  
  # Location
  geolocator: ^10.1.1
  
  # Contacts
  fast_contacts: ^3.0.3
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # Image Picker
  image_picker: ^1.0.4
  
  # Torch/Flashlight
  torch_light: ^1.0.0
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # File Management
  file_picker: ^6.1.1
  open_file: ^3.3.1
  
  # Web Scraping
  web_scraper: ^0.1.4
  html: ^0.15.4
  
  # PDF Generation & Reading
  pdf: ^3.10.7
  printing: ^5.11.2
  
  # Screenshot
  screenshot: ^2.1.0
  
  # Google Fonts - Locked to working version
  google_fonts: 4.0.4
  
  # Camera
  camera: ^0.10.5+9
  
  # File Download
  flutter_downloader: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
