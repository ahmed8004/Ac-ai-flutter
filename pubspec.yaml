name: ac_ai
description: AC AI - Your Intelligent Voice Companion (Complete Automation)

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # UI Animation
  flutter_animate: ^4.3.0
  cupertino_icons: ^1.0.2
  
  # Speech-to-Text (Real)
  speech_to_text: ^6.6.0
  
  # Text-to-Speech (Real)
  flutter_tts: ^3.8.5
  
  # HTTP & API
  http: ^1.2.0
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Background Service
  flutter_background_service: ^5.0.5
  awesome_notifications: ^0.9.3+1
  
  # Location
  geolocator: ^11.0.0
  
  # Contacts
  contacts_service: ^0.6.3
  
  # URL Launcher
  url_launcher: ^6.2.4
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Torch/Flashlight
  torch_light: ^1.5.0
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # File Management
  file_picker: ^6.1.1
  open_file: ^3.3.2
  
  # Web Scraping & Search
  web_scraper: ^0.1.4
  html: ^0.15.4
  
  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # Screenshot
  screenshot: ^2.1.0
  
  # Screen Brightness
  screen_brightness: ^1.0.1
  
  # Volume Control
  volume_controller: ^1.0.7
  
  # Media Player Control
  audio_session: ^0.1.19
  
  # Camera (for document scanning)
  camera: ^0.10.5+9
  
  # File Download
  flutter_downloader: ^1.11.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
