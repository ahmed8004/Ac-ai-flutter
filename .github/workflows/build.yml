name: Build APK

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        cache: true

    - name: Configure local.properties
      run: |
        echo "flutter.sdk=$FLUTTER_HOME" > android/local.properties

    - name: Get dependencies
      run: flutter pub get

    - name: Analyze code
      run: flutter analyze --no-fatal-infos --no-fatal-warnings

    - name: Build APK
      run: flutter build apk --debug --no-tree-shake-icons 2>&1 | tee build.log

    - name: List build outputs
      run: |
        echo "Build outputs:"
        ls -la build/app/outputs/flutter-apk/ || echo "Path not found"
        ls -la build/app/outputs/ || echo "Outputs not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ac-ai-debug-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
        if-no-files-found: error
